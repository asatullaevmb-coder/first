<style>
    /* ==========================================
       БАЗОВЫЕ НАСТРОЙКИ СТРАНИЦЫ И АНИМАЦИЯ
       ========================================== */
    html {
        scroll-behavior: smooth; 
    }
    body {
        background-color: darkred;
        color: #ffffff;
        font-family: sans-serif;
        margin: 0;
        padding: 0;
        transition: background-color 0.4s, color 0.4s;
    }
    
    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
    }

    h1, h2 {
        color: gold;
        text-align: center;
    }
    h1 { font-size: 36px; }
    h2 { font-size: 28px; margin-top: 40px; }
    
    p {
        text-align: center;
        font-size: 18px;
        line-height: 1.6;
    }

    /* ==========================================
       1. ПРИЛИПАЮЩЕЕ НАВИГАЦИОННОЕ МЕНЮ
       ========================================== */
    .navbar {
        position: -webkit-sticky; 
        position: sticky;
        top: 0;
        background-color: rgba(139, 0, 0, 0.95); 
        backdrop-filter: blur(5px); 
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        z-index: 1000;
        transition: background-color 0.4s;
    }
    .logo {
        font-weight: bold;
        font-size: 22px;
        color: gold;
    }
    .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        font-weight: bold;
        transition: 0.3s;
    }
    .nav-links a:hover {
        color: gold;
    }
    
    /* Блок с кнопками управления в меню */
    .nav-controls {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* Стили для подписи темы */
    .theme-wrapper {
        display: flex;
        align-items: center;
        gap: 5px;
        font-weight: bold;
        font-size: 14px;
        color: white;
        transition: color 0.4s;
    }

    .theme-btn-nav, .lang-btn-nav {
        background: transparent;
        border: 1px solid gold;
        color: gold;
        font-weight: bold;
        cursor: pointer;
        padding: 5px;
        border-radius: 8px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
        box-sizing: border-box;
    }
    .theme-btn-nav {
        width: 40px;
        border-radius: 50%;
        font-size: 20px;
    }
    .lang-btn-nav {
        padding: 0 8px;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .theme-btn-nav:hover, .lang-btn-nav:hover {
        transform: scale(1.1);
        background-color: rgba(255, 215, 0, 0.1);
    }

    /* Анимация вращения флага при смене языка */
    .rotate-lang {
        animation: rotateCanvas 0.4s ease-out;
    }

    @keyframes rotateCanvas {
        from { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(0.8); }
        to { transform: rotate(360deg) scale(1); }
    }

    /* ==========================================
       2. КАРТОЧКИ С КРАСИВЫМ ВЫЛЕТОМ
       ========================================== */
    .channel-avatar {
        display: block;
        width: 120px;
        height: 120px;
        max-width: 120px;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 50%;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        flex-shrink: 0; 
    }
    .channel-card {
        display: flex;
        align-items: center;
        justify-content: flex-start; 
        background-color: rgba(0, 0, 0, 0.2);
        padding: 20px;
        border-radius: 16px;
        margin: 25px auto;
        max-width: 650px;
        gap: 25px; 
        transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.4s;
        
        opacity: 0;
        transform: translateY(40px);
        animation: slideUpFade 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    .channel-card:hover {
        transform: translateY(-8px); 
        box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3); 
        background-color: rgba(0, 0, 0, 0.3);
    }

    .channel-info { 
        display: flex;
        flex-direction: column;
        align-items: flex-start; 
        text-align: left; 
        flex-grow: 1;
    }
    .channel-info h2 { 
        color: gold; 
        margin: 0 0 8px 0; 
        text-align: left; 
        font-size: 22px; 
    }
    .channel-info .channel-desc { 
        color: #ffffff; 
        font-size: 15px; 
        margin: 0 0 15px 0; 
        text-align: left; 
        line-height: 1.4;
        transition: color 0.4s;
    }

    /* Кнопка с иконкой Telegram */
    .my-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px; 
        width: auto;
        white-space: nowrap;
        padding: 12px 24px;      
        background-color: gold;
        color: blueviolet;
        text-align: center;
        text-decoration: none;
        font-weight: bold;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        transition: background-color 0.3s, color 0.3s, transform 0.3s, box-shadow 0.3s;
        box-sizing: border-box;
    }

    .my-button svg {
        fill: currentColor; 
        transition: fill 0.3s;
    }

    .my-button:hover { 
        background-color: blueviolet; 
        color: gold; 
        transform: scale(1.05); 
        box-shadow: 0 6px 15px rgba(0,0,0,0.4);
    }

    /* ==========================================
       3. ФОРМА ОБРАТНОЙ СВЯЗИ
       ========================================== */
    .contact-section {
        max-width: 500px;
        margin: 50px auto;
    }
    .contact-form {
        display: flex;
        flex-direction: column;
        gap: 15px; 
    }
    .contact-form input,

        width: 100%;
        padding: 12px 15px;
        border-radius: 8px;
        border: 2px solid transparent;
        background-color: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 16px;
        box-sizing: border-box;
        transition: 0.3s;
    }
    .contact-form input:focus, 
    .contact-form textarea:focus {
        outline: none;
        border-color: gold;
        background-color: rgba(255, 255, 255, 0.15);
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }
    
    .submit-btn {
        background-color: gold;
        color: blueviolet;
        border: none;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: 0.3s;
    }
    .submit-btn:hover {
        background-color: blueviolet;
        color: gold;
        transform: translateY(-2px);
    }

    /* СТИЛИ ТЕМ ДЛЯ МЕНЮ И ФОРМЫ */
    body.light-theme { background-color: #f4f4f4; color: #333333; }
    body.light-theme .navbar { background-color: rgba(255, 255, 255, 0.95); }
    body.light-theme .nav-links a { color: #333333; }
    body.light-theme .nav-links a:hover { color: darkred; }

    body.light-theme .channel-card:hover { box-shadow: 0 10px 25px rgba(139, 0, 0, 0.2); background-color: rgba(0, 0, 0, 0.08); }
    body.light-theme .channel-desc { color: #444444; }
    body.light-theme .contact-form input, body.light-theme .contact-form textarea { background-color: rgba(0, 0, 0, 0.05); color: #333333; }

    body.light-theme .contact-form input::placeholder, body.light-theme .contact-form textarea::placeholder { color: #777777; }
    body.light-theme .submit-btn { background-color: darkred; color: white; }

    body.dark-theme { background-color: #121212; color: #e0e0e0; }
    body.dark-theme .navbar { background-color: rgba(30, 30, 30, 0.95); }
    body.dark-theme .theme-wrapper { color: #e0e0e0; }

    body.dark-theme .contact-form input, body.dark-theme .contact-form textarea { background-color: #1e1e1e; border: 1px solid #333333; color: #ffffff !important; }

    @media (max-width: 600px) {

        .logo { font-size: 18px; }
        .nav-links a { margin-left: 10px; font-size: 14px; }
        .channel-card { flex-direction: column; text-align: center; padding: 15px; margin: 15px; gap: 15px; }
        .channel-info { margin-left: 0; align-items: center; text-align: center; }
        .channel-info h2 { text-align: center; }
        .channel-info .channel-desc { text-align: center; }
        .my-button { width: 100%; max-width: 200px; }
    }

    @keyframes slideUpFade {
        from { 
            opacity: 0; 
            transform: translateY(40px); 
        }
        to {

        }
    }
</style>

              langToggleBtn.innerHTML = langFlags.ru;
          }

          renderChannels();
      }

      // ФУНКЦИЯ РЕНДЕРА КАРТОЧЕК С НОВЫМИ ССЫЛКАМИ НА КАРТИНКИ
      function renderChannels() {
          const container = document.getElementById('channels-container');
          container.innerHTML = ""; 

          // Официальный векторный логотип Telegram (белый самолетик)
          const tgIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" style="fill: currentColor; vertical-align: middle;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.58.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.53-1.39.51-.46-.01-1.33-.26-1.99-.48-.8-.27-1.44-.42-1.39-.89.03-.25.38-.51 1.07-.78 4.19-1.82 6.99-3.02 8.39-3.6 3.99-1.66 4.82-1.95 5.36-1.96.12 0 .39.03.57.18.15.12.19.29.21.41-.02.11-.01.23-.02.34z"/></svg>`;

          for (let i = 0; i < myTelegramChannels.length; i++) {
              const currentChannel = myTelegramChannels[i];
              const langData = currentChannel[currentLang]; 

              const cardHtml = `
                  <div class="channel-card" style="animation-delay: ${i * 0.2}s">
                      <img src="${currentChannel.img}" alt="avatar" class="channel-avatar">
                      <div class="channel-info">
                          <h2>${langData.title}</h2>
                          <p class="channel-desc">${langData.desc}</p>
                          <a href="${currentChannel.link}" target="_blank" class="my-button">
                              ${tgIconSvg} 
                              <span>${translations[currentLang].btnGo}</span>
                          </a>
                      </div> 
                  </div>
              `;
              container.innerHTML += cardHtml;
          }
      }

      const langToggleBtn = document.getElementById('lang-toggle');
      langToggleBtn.addEventListener('click', () => {
          langToggleBtn.classList.add('rotate-lang');
          
          setTimeout(() => {
              langToggleBtn.classList.remove('rotate-lang');
          }, 400);

          if (currentLang === 'ru') {
              currentLang = 'en';
          } else if (currentLang === 'en') {
              currentLang = 'uz';
          } else {
              currentLang = 'ru';
          }
          
          localStorage.setItem('userLang', currentLang); 
          updateLanguageUI();
      });

      // =========================================================
      // ЛОГИКА ТЕМ С СОХРАНЕНИЕМ (LOCALSTORAGE) 💾
      // =========================================================
      const themeBtn = document.getElementById('theme-toggle');
      const themes = ['default', 'light', 'dark'];
      
      let savedThemeIndex = localStorage.getItem('userThemeIndex');
      let currentThemeIndex = savedThemeIndex !== null ? parseInt(savedThemeIndex) : 0;

      function applyTheme(index) {
          const currentTheme = themes[index];
          document.body.classList.remove('light-theme', 'dark-theme');

          if (currentTheme === 'default') { themeBtn.textContent = '🍷'; } 
          else if (currentTheme === 'light') { document.body.classList.add('light-theme'); themeBtn.textContent = '☀️'; } 
          else if (currentTheme === 'dark') { document.body.classList.add('dark-theme'); themeBtn.textContent = '🌙'; }
      }

      applyTheme(currentThemeIndex);

      themeBtn.addEventListener('click', () => {
          currentThemeIndex = (currentThemeIndex + 1) % themes.length;
          localStorage.setItem('userThemeIndex', currentThemeIndex);
          applyTheme(currentThemeIndex);
      });

      updateLanguageUI();

      // =========================================================
      // ОТПРАВКА ФОРМЫ В ТЕЛЕГРАМ ✈️
      // =========================================================
      const tgForm = document.getElementById('tg-form');

      tgForm.addEventListener('submit', function(e) {
          e.preventDefault(); 
          const submitBtn = document.getElementById('submit-btn');
          const t = translations[currentLang];

          const name = document.getElementById('user-name').value;
          const telegram = document.getElementById('user-telegram').value;
          const message = document.getElementById('user-message').value;

          let textMessage = `🔔 <b>Новое сообщение с сайта портфолио!</b>\n\n`;
          textMessage += `👤 <b>Имя:</b> ${name}\n`;
          textMessage += `✈️ <b>Telegram:</b> ${telegram}\n`;
          textMessage += `💬 <b>Сообщение:</b> ${message}`;

          submitBtn.textContent = t.btnSending;
          submitBtn.disabled = true;

          const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

          fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  chat_id: TELEGRAM_CHAT_ID,
                  parse_mode: 'html', 
                  text: textMessage
              })
          })
          .then(response => {
              if (response.ok) {
                  alert(t.alertSuccess);
                  tgForm.reset(); 
              } else {
                  alert(t.alertError);
              }
          })
          .catch(error => {
              console.error('Ошибка:', error);
              alert(t.alertNetwork);
          })
          .finally(() => {
              submitBtn.textContent = t.btnSend;
              submitBtn.disabled = false;
          });
      });
  </script>
</body>
</html>
